name: screenplay_generator_tool
description: "Генерирует режиссерский сценарий для анимационного фильма на основе готового сторибука"
category: "Генерация"
source_type: custom_function
implementation_source: custom_tools.storybook.screenplay_generator.screenplay_generator_tool
parameters:
  - name: session_id
    type: str
    description: "Идентификатор сессии для трассировки выполнения"
    required: true
  - name: project_id
    type: str
    description: "Идентификатор проекта для которого генерируется сценарий"
    required: true
  - name: screenplay_time
    type: int
    description: "Длительность сценария в секундах"
    required: true
  - name: enable
    type: bool
    description: "Если True, генерирует сценарий, иначе просто пропускает"
    required: false
