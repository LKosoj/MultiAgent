name: video_generator_tool
description: "Генерирует видео из изображений с использованием Kling AI API на основе video промптов"
category: "storybook"
source_type: custom_function
implementation_source: custom_tools.storybook.video_generator.video_generator_tool
parameters:
  - name: "session_id"
    type: "str"
    description: "Идентификатор сессии для трассировки выполнения"
    required: true
  - name: "items"
    type: "Any"
    description: "Данные items или JSON-строка с кадрами для конвертации в видео. Ожидаемая структура: {items: [список кадров], consistency_rules: [правила]}. Инструмент автоматически найдет start/end изображения в директории video_path"
    required: true
  - name: "project_id"
    type: "str"
    description: "Идентификатор проекта для логирования и контекста"
    required: false
  - name: "max_concurrency"
    type: "int"
    description: "Максимальное количество параллельных запросов к API (по умолчанию 3)"
    required: false
  - name: "enable"
    type: "bool"
    description: "Если True, выполняет генерацию видео. Если False, пропускает выполнение (по умолчанию False)"
    required: false
  - name: "seed"
    type: "int"
    description: "Сид для генерации видео"
    required: false
  - name: "language"
    type: "str"
    description: "Язык генерации для корректного перевода промптов (по умолчанию 'en')"
    required: false
  - name: "force_update_prompts"
    type: "bool"
    description: "Если True, принудительно обновляет video_prompt независимо от timestamp (по умолчанию False)"
    required: false
  - name: "skip_prompt_enhancement"
    type: "bool"
    description: "Если True, пропускает улучшение промпта LLM (только перевод, без добавления деталей и без галлюцинаций). По умолчанию False"
    default: false
    required: false
