# PII-категории для промпта LLM-детектора PII в Text-to-SQL.
# Source of truth для compliance-критичной классификации (152-ФЗ / GDPR).
# Извлечено из custom_tools/text_to_sql/prompts.py @T4.6.
#
# Изменение списка категорий или их sensitivity-маппинга — политическое
# решение и должно делаться через этот yaml, а не правкой Python-кода.
#
# Bump v1 → v2 (EPIC 5.4): sensitivity-уровни вынесены из Python
# (_ALLOWED_SENSITIVITIES) в секцию policy ниже. v1 без policy теперь
# отвергается с явной ошибкой миграции (fail-fast, без silent fallback).
version: 2

# Политика загрузчика. ``sensitivity_levels`` — единственный source
# of truth для допустимых уровней чувствительности. Раньше это был
# хардкод в pii_categories_config.py.
policy:
  sensitivity_levels: ["low", "medium", "high"]

default_jurisdiction: ru

jurisdictions:
  ru:
    description: "Российские требования (152-ФЗ)"
    # Префикс перед перечислением категорий — задаёт «настроение» уровня.
    prefixes:
      low: "только критичные PII"
      medium: "персональные данные"
      high: "любые данные связанные с личностью"
    # Дополнительный негативный хвост (что НЕ считать PII на этом уровне).
    # Пустая строка / отсутствие ключа = без хвоста.
    negatives:
      medium: "но НЕ города, возраст или зарплаты"
    fullname_exclusions:
      - республика
      - россия
      - российская
      - российской
      - российскую
      - российские
      - город
      - города
      - область
      - области
      - край
      - края
      - округ
      - округа
      - федерация
      - федерации
      - район
      - района
    sync_masking:
      # Regex-only маскировка для audit/RAG путей, где LLM-вызов запрещён.
      # Порядок правил является частью политики: более специфичные идентификаторы
      # применяются до более широких числовых/телефонных шаблонов.
      rules:
        - id: email
          pattern: '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
          replacement: '[EMAIL]'
        - id: inn
          pattern: '(?i)\b(?:ИНН|INN)[\s:№#]{0,3}(?<!\d)(\d{12}|\d{10})(?!\d)'
          replacement: '[INN]'
          preserve_before_group: 1
        - id: passport
          pattern: '(?<!\d)\d{4}\s\d{6}(?!\d)'
          replacement: '[PASSPORT]'
        - id: snils
          pattern: '(?<!\d)\d{3}-\d{3}-\d{3}[\s-]\d{2}(?!\d)'
          replacement: '[SNILS]'
        - id: card_number
          # Разделитель идёт МЕЖДУ цифрами (а не после последней), иначе sub
          # поглощал бы трейлинг-пробел/дефис после номера и портил соседний
          # текст ('4111 1111 1111 1111 next' -> '[CARD]next'). 13-19 цифр.
          # ОСОЗНАННОЕ ОГРАНИЧЕНИЕ (НЕ silent): разделитель `[ -]?` допускается
          # между любыми цифрами, поэтому ДВА соседних числа через один пробел/
          # дефис с суммарной длиной 13–19 цифр будут склеены и замаскированы
          # как карта (напр. '45000000 100000' = ОКТМО-8 + счётчик → [CARD]).
          # В audit/RAG-путях, для которых предназначен pii_mask_sync, числа
          # обычно в отдельных ячейках, поэтому риск over-masking приемлем; не
          # ужесточаем до строгих групп (4-4-4-4 / 4-6-5), чтобы не пропустить
          # реальные карты (under-masking PII опаснее over-masking).
          pattern: '(?<!\d)\d(?:[ -]?\d){12,18}(?!\d)'
          replacement: '[CARD]'
        - id: phone
          # ОСОЗНАННЫЙ КОМПРОМИСС (НЕ silent): голые 11-значные коды ОКТМО/ОКАТО
          # (муниципальный РФ-датасет) структурно неотличимы от телефонов без
          # префикса, и regex по одному паттерну не может их развести —
          # маскировка таких кодов как телефон порвала бы данные. Поэтому ОБЕ
          # «безпрефиксные» ветки требуют разделитель и НЕ ловят голый формат:
          #   * `7...` требует ОБЯЗАТЕЛЬНОГО разделителя (`7[\s\-]+`);
          #   * `8...` требует, чтобы за `8` шёл разделитель ИЛИ `(`
          #     (lookahead `(?=[\s\-(])`) — иначе голый `8XXXXXXXXXX`, в т.ч.
          #     ОКТМО регионов 80–89 (83x Ненецкий, 86x Ханты-Мансийский,
          #     89x Ямало-Ненецкий), ошибочно маскировался бы как телефон.
          # Ветка `+7...` безопасна и без разделителя: литерал `+` сам разводит
          # её с числовыми кодами. Для реальных колонок телефонов используйте
          # column-aware маскировку (column_names в pii_masking), а не regex.
          pattern: '(?<![A-Za-zА-Яа-яЁё0-9])(?:\+7[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}|8(?=[\s\-(])[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}|7[\s\-]+\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2})(?![A-Za-zА-Яа-яЁё0-9])'
          replacement: '[PHONE]'
        - id: full_name
          pattern: '\b[А-ЯЁ][а-яё]{1,30}\s+[А-ЯЁ][а-яё]{1,30}(?:\s+[А-ЯЁ][а-яё]{1,30})?\b'
          replacement: '[FULLNAME]'
          enabled: false
          enable_env: PII_MASK_FULLNAME
          use_fullname_exclusions: true
    # Категории в порядке, в котором их нужно перечислять в промпте.
    # label_ru — то, что попадает в текст промпта.
    # label_ru_overrides.<sensitivity> — переопределение лейбла на конкретном
    #   уровне (например, для low показываем «полное имя» вместо «имя»).
    # sensitivities — на каких уровнях категория считается PII.
    categories:
      - id: full_name
        label_ru: "имя"
        label_ru_overrides:
          low: "полное имя"
        sensitivities: [low, medium, high]
      - id: email
        label_ru: "email"
        sensitivities: [low, medium, high]
      - id: phone
        label_ru: "телефон"
        sensitivities: [low, medium, high]
      - id: address
        label_ru: "адрес"
        sensitivities: [medium, high]
      - id: age
        label_ru: "возраст"
        sensitivities: [high]
      - id: salary
        label_ru: "зарплата"
        sensitivities: [high]
      - id: position
        label_ru: "должность"
        sensitivities: [high]
      - id: passport
        label_ru: "паспорт"
        sensitivities: [low, medium, high]
      - id: ssn
        label_ru: "SSN"
        sensitivities: [low, medium, high]
      - id: card_number
        label_ru: "номера карт"
        # Намеренно НЕ включаем high: исторически high-промпт не упоминал
        # номера карт. Если поведение нужно расширить — менять здесь.
        sensitivities: [low, medium]
      - id: ip
        label_ru: "IP"
        sensitivities: [high]

  eu:
    description: "GDPR требования (заготовка; уточнить под конкретный кейс)"
    prefixes:
      low: "только критичные PII"
      medium: "персональные данные"
      high: "любые данные связанные с личностью"
    negatives: {}
    sync_masking:
      rules:
        - id: email
          pattern: '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
          replacement: '[EMAIL]'
        - id: card_number
          pattern: '(?<!\d)(?:\d[ -]?){13,19}(?!\d)'
          replacement: '[CARD]'
        - id: ssn
          pattern: '(?<!\d)\d{3}-\d{2}-\d{4}(?!\d)'
          replacement: '[SSN]'
        - id: passport
          pattern: '(?i)\b(?:passport|pass|паспорт)[\s:№#-]*([A-Z0-9]{6,9})\b'
          replacement: '[PASSPORT]'
          preserve_before_group: 1
        - id: ip
          pattern: '(?<![\d.])(?:25[0-5]|2[0-4]\d|1?\d?\d)(?:\.(?:25[0-5]|2[0-4]\d|1?\d?\d)){3}(?![\d.])'
          replacement: '[IP]'
        - id: phone
          pattern: '(?<![A-Za-z0-9])(?:\+?\d{1,3}[\s\-]?)?(?:\(?\d{2,4}\)?[\s\-]?){2,4}\d{2,4}(?![A-Za-z0-9])'
          replacement: '[PHONE]'
        - id: full_name
          pattern: '\b[A-Z][a-z]{1,30}\s+[A-Z][a-z]{1,30}(?:\s+[A-Z][a-z]{1,30})?\b'
          replacement: '[FULLNAME]'
          enabled: false
          enable_env: PII_MASK_FULLNAME
    categories:
      - id: full_name
        label_ru: "имя"
        label_ru_overrides:
          low: "полное имя"
        sensitivities: [low, medium, high]
      - id: email
        label_ru: "email"
        sensitivities: [low, medium, high]
      - id: phone
        label_ru: "телефон"
        sensitivities: [low, medium, high]
      - id: address
        label_ru: "адрес"
        # GDPR: адрес — PII на любом уровне.
        sensitivities: [low, medium, high]
      - id: age
        label_ru: "возраст"
        # GDPR: возраст может быть persistent identifier → начиная с medium.
        sensitivities: [medium, high]
      - id: salary
        label_ru: "зарплата"
        sensitivities: [medium, high]
      - id: position
        label_ru: "должность"
        sensitivities: [high]
      - id: passport
        label_ru: "паспорт"
        sensitivities: [low, medium, high]
      - id: ssn
        label_ru: "SSN"
        sensitivities: [low, medium, high]
      - id: card_number
        label_ru: "номера карт"
        sensitivities: [low, medium, high]
      - id: ip
        label_ru: "IP"
        sensitivities: [medium, high]
