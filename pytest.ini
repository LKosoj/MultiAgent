[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:pydantic._internal._fields
# Root/app-local test*.py files are manual smoke scripts with local services,
# GUI imports, or absolute fixtures. Default pytest runs the maintained
# regression suite; run scripts/run_manual_smoke_tests.sh for the explicit
# manual-smoke target.
testpaths =
    tests
